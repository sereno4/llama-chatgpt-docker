<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TinyLlama Chat</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#343541;color:#ececf1;height:100vh;display:flex;flex-direction:column}.header{padding:12px 20px;background:#202123;border-bottom:1px solid #4d4d4f;display:flex;align-items:center;gap:10px}.header h1{font-size:1.2rem;font-weight:600}.header .status{font-size:0.8rem;color:#22c55e}.chat-container{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}.message{display:flex;gap:12px;padding:16px;border-radius:8px;max-width:800px;margin:0 auto;width:100%}.message.user{background:#343541}.message.assistant{background:#444654}.avatar{width:30px;height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}.user .avatar{background:#5436DA}.assistant .avatar{background:#19c37d}.content{flex:1;line-height:1.5;white-space:pre-wrap}.input-area{padding:16px 20px;background:#343541;border-top:1px solid #4d4d4f}.input-form{max-width:800px;margin:0 auto;display:flex;gap:12px}.input-form textarea{flex:1;padding:12px 16px;border-radius:8px;border:1px solid #565869;background:#40414f;color:#ececf1;resize:none;font-size:1rem;min-height:50px;max-height:200px}.input-form textarea:focus{outline:2px solid #19c37d;border-color:transparent}.input-form button{padding:12px 20px;background:#19c37d;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:background 0.2s}.input-form button:hover{background:#1a9f66}.input-form button:disabled{background:#565869;cursor:not-allowed}.typing{display:flex;gap:4px;padding:8px 0}.typing span{width:8px;height:8px;background:#aaa;border-radius:50%;animation:bounce 1.4s infinite ease-in-out}.typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}</style></head><body><div class="header"><h1>🤖 TinyLlama Chat</h1><span class="status" id="status">● Online</span></div><div class="chat-container" id="chat"></div><div class="input-area"><form class="input-form" id="chat-form"><textarea id="message-input" placeholder="Digite sua mensagem..." rows="1" required></textarea><button type="submit" id="send-btn">Enviar</button></form></div><script>const API_URL='http://localhost:8001/v1/chat/completions';const chat=document.getElementById('chat');const form=document.getElementById('chat-form');const input=document.getElementById('message-input');const sendBtn=document.getElementById('send-btn');const status=document.getElementById('status');let messages=[];function addMessage(role,content){const msg=document.createElement('div');msg.className=`message ${role}`;msg.innerHTML=`<div class="avatar">${role==='user'?'U':'AI'}</div><div class="content">${content}</div>`;chat.appendChild(msg);chat.scrollTop=chat.scrollHeight}function showTyping(){const msg=document.createElement('div');msg.className='message assistant';msg.id='typing';msg.innerHTML='<div class="avatar">AI</div><div class="typing"><span></span><span></span><span></span></div>';chat.appendChild(msg);chat.scrollTop=chat.scrollHeight}function hideTyping(){const t=document.getElementById('typing');if(t)t.remove()}async function sendMessage(prompt){messages.push({role:'user',content:prompt});addMessage('user',prompt);showTyping();sendBtn.disabled=true;try{const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'tinyllama',messages,max_tokens:512,temperature:0.7})});if(!res.ok)throw new Error('API error');const data=await res.json();hideTyping();messages.push({role:'assistant',content:data.choices[0].message.content});addMessage('assistant',data.choices[0].message.content)}catch(e){hideTyping();addMessage('assistant','❌ Erro: '+e.message);status.textContent='● Offline';status.style.color='#ef4444'}finally{sendBtn.disabled=false;input.focus()}}form.addEventListener('submit',e=>{e.preventDefault();const p=input.value.trim();if(!p)return;input.value='';sendMessage(p)});async function checkHealth(){try{const r=await fetch('http://localhost:8001/health');if(r.ok){status.textContent='● Online';status.style.color='#22c55e'}}catch{status.textContent='● Offline';status.style.color='#ef4444'}}setInterval(checkHealth,30000);checkHealth();</script></body></html>
